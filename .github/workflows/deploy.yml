name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:            # 支持在 Actions 页面手动触发

# 全局环境变量：仓库地址/命名空间走 secrets（不硬编码）
env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: insight-hub

jobs:
  # ========== Job 1: 构建并推送 Docker 镜像 ==========
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15         # 构建超时保护
    permissions:
      contents: read             # 最小权限
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 登录阿里云容器镜像服务
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 配置 Docker Buildx 构建器（支持缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送镜像，双标签便于回滚，使用 GitHub Actions 缓存加速
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |                # 双标签：latest + commit SHA
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha   # 从 GitHub Actions 缓存拉取
          cache-to: type=gha,mode=max  # 写入完整缓存

  # ========== Job 2: 部署到远程服务器 ==========
  deploy:
    name: Deploy to Server
    needs: build-and-push        # 等待镜像构建完成后再部署
    runs-on: ubuntu-latest
    timeout-minutes: 60          # 部署超时保护
    if: github.ref == 'refs/heads/main'   # 仅 main 分支执行部署
    steps:
      # 检出代码（需要 docker-compose.yml 文件）
      - name: Checkout
        uses: actions/checkout@v4

      # 确保远程目录存在且权限正确
      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH || '/app/insight-hub' }}
            sudo chown -R $USER:$USER ${{ secrets.DEPLOY_PATH || '/app/insight-hub' }}

      # 将 docker-compose.yml 复制到服务器
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH || '/app/insight-hub' }}

      # SSH 部署：通过 envs 把 secret 传到远程，避免直接插值进 script
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_NAME: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CUSTOM_BASE_URL: ${{ secrets.CUSTOM_BASE_URL }}
          CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
          CUSTOM_MODEL_NAME: ${{ secrets.CUSTOM_MODEL_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'sqlite:///./data/insight_hub.db' }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 60m
          envs: IMAGE_NAME,TAVILY_API_KEY,DEEPSEEK_API_KEY,CUSTOM_BASE_URL,CUSTOM_API_KEY,CUSTOM_MODEL_NAME,DATABASE_URL,ACR_REGISTRY,ACR_USERNAME,ACR_PASSWORD
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/app/insight-hub' }}

            # 用 envs 变量逐行写入 .env（secret 不出现在 script 字符串里）
            echo "IMAGE_NAME=$IMAGE_NAME" > .env
            echo "TAVILY_API_KEY=$TAVILY_API_KEY" >> .env
            echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" >> .env
            echo "CUSTOM_BASE_URL=$CUSTOM_BASE_URL" >> .env
            echo "CUSTOM_API_KEY=$CUSTOM_API_KEY" >> .env
            echo "CUSTOM_MODEL_NAME=$CUSTOM_MODEL_NAME" >> .env
            echo "DATABASE_URL=$DATABASE_URL" >> .env

            # 登录镜像仓库（stdin 传密码，更安全）
            echo "$ACR_PASSWORD" | docker login --username "$ACR_USERNAME" --password-stdin "$ACR_REGISTRY"

            # 拉取最新镜像并重启
            docker compose pull
            docker compose up -d --remove-orphans   # 启动新容器并移除孤儿容器

            # 清理不再使用的旧镜像，释放磁盘空间
            docker image prune -f

            # 等待服务启动后检查状态
            sleep 15
            docker compose ps

            echo "✅ 部署完成！"
