# GitHub Actions CI/CD 工作流
# 当代码推送到 main 分支时，自动构建 Docker 镜像并部署到服务器

name: Build and Deploy

on:
  push:
    branches: [main]

# 全局环境变量：镜像仓库和镜像名称
env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}     # 阿里云 ACR 仓库地址
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}   # ACR 命名空间
  IMAGE_NAME: insight-hub                        # 镜像名称

jobs:
  # ========== Job 1: 构建并推送 Docker 镜像 ==========
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 登录阿里云容器镜像服务
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 配置 Docker Buildx 构建器（支持多平台构建和缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送镜像，使用 GitHub Actions 缓存加速
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/insight-hub:latest
          cache-from: type=gha   # 从 GitHub Actions 缓存拉取
          cache-to: type=gha,mode=max  # 写入完整缓存

  # ========== Job 2: 部署到远程服务器 ==========
  deploy:
    name: Deploy to Server
    needs: build-and-push  # 等待镜像构建完成后再部署
    runs-on: ubuntu-latest
    steps:
      # 检出代码（需要 docker-compose.yml 文件）
      - name: Checkout
        uses: actions/checkout@v4

      # 将 docker-compose.yml 复制到服务器
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/insight-hub/
          strip_components: 0

      # SSH 登录服务器执行部署命令
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/insight-hub

            # 生成环境变量文件（包含 API Key 等敏感信息）
            cat > .env <<'ENV_EOF'
            IMAGE_NAME=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/insight-hub:latest
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            CUSTOM_BASE_URL=${{ secrets.CUSTOM_BASE_URL }}
            CUSTOM_API_KEY=${{ secrets.CUSTOM_API_KEY }}
            CUSTOM_MODEL_NAME=${{ secrets.CUSTOM_MODEL_NAME }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ENV_EOF

            # 登录镜像仓库，拉取最新镜像
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans   # 启动新容器并移除孤儿容器

            # 清理不再使用的旧镜像，释放磁盘空间
            docker image prune -f

            # 等待服务启动后检查状态
            sleep 15
            docker compose ps

            echo "✅ 部署完成！"
