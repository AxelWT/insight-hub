name: Build and Deploy

on:
  push:
    branches: [main]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: insight-hub

jobs:
  # Job 1: 构建并推送镜像
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/insight-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: 部署到服务器
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/insight-hub/
          strip_components: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/insight-hub

            # 生成环境变量文件
            cat > .env <<'ENV_EOF'
            IMAGE_NAME=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/insight-hub:latest
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            CUSTOM_BASE_URL=${{ secrets.CUSTOM_BASE_URL }}
            CUSTOM_API_KEY=${{ secrets.CUSTOM_API_KEY }}
            CUSTOM_MODEL_NAME=${{ secrets.CUSTOM_MODEL_NAME }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ENV_EOF

            # 登录镜像仓库
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

            # 拉取最新镜像并启动
            docker compose pull
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            # 等待服务启动
            sleep 15

            # 检查服务状态
            docker compose ps

            echo "✅ 部署完成！"
