# Docker Compose 服务编排配置
# 使用方法: docker compose up -d

services:
  app:
    # 镜像名称：优先使用环境变量指定的镜像（CI/CD 部署），
    # 未指定时使用本地构建（开发环境）
    image: ${IMAGE_NAME:-insight-hub:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: insight-hub
    ports:
      - "8002:8000"  # 宿主机 8002 映射到容器 8000
    volumes:
      - ./backend/data:/app/backend/data       # 持久化 SQLite 数据库
      - ./backend/reports:/app/backend/reports  # 持久化导出的报告文件
    env_file:
      - .env                # 从 .env 文件加载环境变量
    environment:
      - TZ=Asia/Shanghai    # 设置容器时区为中国标准时间
    restart: unless-stopped  # 异常退出时自动重启（手动停止除外）
    healthcheck:
      # 健康检查：每 30 秒访问 /health 接口
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s   # 检查间隔
      timeout: 10s    # 超时时间
      retries: 3      # 连续失败次数后标记为 unhealthy
