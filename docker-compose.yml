services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: insight-hub-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data       # 持久化数据库
      - ./backend/reports:/app/backend/reports  # 持久化报告
    env_file:
      - .env                                   # 从根目录读取 .env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insight-hub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
